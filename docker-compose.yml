services:
  taiwanlife-monitor:
    build:
      context: .
    image: ${MONITOR_IMAGE:-taiwanlife-monitor:local}
    env_file:
      - path: .env
        required: false
    working_dir: /app
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PYTHONUNBUFFERED: "1"
      MONITOR_SCHEDULER: ${MONITOR_SCHEDULER:-docker-compose}
      MONITOR_ENABLE_RPA84: ${MONITOR_ENABLE_RPA84:-false}
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
    volumes:
      - ./config:/app/config:ro
      - ./reports:/app/reports
    shm_size: ${MONITOR_SHM_SIZE:-2gb}
    tmpfs:
      - /tmp:size=512m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - python
      - -m
      - taiwanlife_monitor.monitor
      - --config
      - config/taiwanlife.json
      - --output-dir
      - reports
      - --email-on-fail
      - --fail-exit-code

  flow-editor:
    profiles:
      - tools
    build:
      context: .
    image: ${MONITOR_IMAGE:-taiwanlife-monitor:local}
    env_file:
      - path: .env
        required: false
    working_dir: /app
    user: "${FLOW_UI_UID:-1000}:${FLOW_UI_GID:-1000}"
    ports:
      - "${FLOW_UI_BIND_ADDR:-127.0.0.1}:${FLOW_UI_PORT:-8787}:8787"
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PYTHONUNBUFFERED: "1"
      FLOW_UI_TOKEN: ${FLOW_UI_TOKEN:-}
    volumes:
      - ./config:/app/config
      - ./reports:/app/reports
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - python
      - -m
      - taiwanlife_monitor.flow_ui
      - --config
      - config/taiwanlife.json
      - --output-dir
      - reports
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --no-browser

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${N8N_BIND_ADDR:-127.0.0.1}:${N8N_HOST_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Asia/Taipei}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Taipei}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-32-byte-random-secret}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${N8N_EXECUTIONS_DATA_MAX_AGE:-336}
      NODES_EXCLUDE: ${N8N_NODES_EXCLUDE:-[]}
      MONITOR_WORKDIR: ${MONITOR_WORKDIR:-/opt/taiwanlife-monitor}
      MONITOR_PYTHON_BIN: ${MONITOR_PYTHON_BIN:-python}
      MONITOR_CONFIG: ${MONITOR_CONFIG:-config/taiwanlife.json}
      MONITOR_OUTPUT_DIR: ${MONITOR_OUTPUT_DIR:-reports}
      MONITOR_ENABLE_RPA84: ${MONITOR_ENABLE_RPA84:-false}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/opt/n8n-workflows:ro
      - ./reports:/opt/taiwanlife-reports:ro

volumes:
  n8n_data:
